<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NOVA STRIKE — Space Combat</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --glow-cyan: rgba(0, 243, 255, 0.4);
      --glow-magenta: rgba(255, 0, 255, 0.4);
      --glow-orange: rgba(255, 122, 0, 0.4);
      --glow-purple: rgba(188, 19, 254, 0.4);
      --bg-dark: #020208;
      --font-title: 'Orbitron', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      color: #ffffff;
      font-family: var(--font-body);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Screen Wrapper simulating an arcade cabinet */
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8) inset;
    }

    /* Primary HTML5 Canvas */
    #game-canvas {
      display: block;
      background: var(--bg-dark);
      width: 100%;
      height: 100%;
      object-fit: contain;
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
    }

    /* CRT Scanline Overlay Effect */
    .crt::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      z-index: 10;
      pointer-events: none;
      opacity: 0.7;
    }

    /* CRT Flickering Overlay */
    .crt-flicker {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 9;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.015; }
      50% { opacity: 0.025; }
      100% { opacity: 0.015; }
    }

    /* Premium Preloader Overlay */
    #loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #020206;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    .loader-title {
      font-family: var(--font-title);
      font-size: 2.5rem;
      font-weight: 900;
      color: #00f3ff;
      letter-spacing: 0.4rem;
      text-transform: uppercase;
      margin-bottom: 2rem;
      text-shadow: 0 0 10px var(--glow-cyan);
      animation: pulse 1.5s infinite ease-in-out;
    }

    .loader-ring {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0, 243, 255, 0.1);
      border-top-color: #00f3ff;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
    }

    .loader-text {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.2rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.3); }
    }
  </style>
</head>
<body>

  <div id="game-container" class="crt">
    <!-- Flickering effect -->
    <div class="crt-flicker"></div>
    
    <!-- Loader screen -->
    <div id="loader">
      <div class="loader-title">Nova Strike</div>
      <div class="loader-ring"></div>
      <div class="loader-text">Loading Subsystems...</div>
    </div>
    
    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Bootstrapping Game -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
